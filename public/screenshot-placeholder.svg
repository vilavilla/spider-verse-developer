<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Spider-Verse Developer screenshot placeholder</title>
  <desc id="desc">A dark placeholder asking the developer to replace it with a real screenshot.</desc>
  <defs><radialGradient id="g"><stop stop-color="#301023"/><stop offset="1" stop-color="#03040a"/></radialGradient></defs>
  <rect width="1440" height="900" fill="url(#g)"/>
  <g fill="none" stroke="#ed1c35" stroke-width="8" opacity=".55">
    <circle cx="720" cy="450" r="160"/><circle cx="720" cy="450" r="250"/><path d="M720 160v580M430 450h580M515 245l410 410M925 245 515 655"/>
  </g>
  <text x="720" y="430" fill="#f5f3ee" font-family="Arial,sans-serif" font-size="42" font-weight="700" text-anchor="middle">ADD PROJECT SCREENSHOT / GIF</text>
  <text x="720" y="485" fill="#9ca1b2" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">Replace public/screenshot-placeholder.svg before publishing</text>
